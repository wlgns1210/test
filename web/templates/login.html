<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Load Test Platform — 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center">

  <div class="w-full max-w-sm mx-4">
    <!-- 로고 -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Load Test Platform</h1>
      <p class="text-slate-400 text-sm mt-1">부하 테스트 관리 플랫폼</p>
    </div>

    <!-- 로그인 카드 -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      {{if .Error}}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2 text-red-700 text-sm">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>
      {{end}}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">아이디</label>
          <input
            type="text"
            name="username"
            required
            autocomplete="username"
            placeholder="아이디를 입력하세요"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-slate-900
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                   placeholder-slate-400 text-sm transition"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">비밀번호</label>
          <input
            type="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-slate-900
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                   placeholder-slate-400 text-sm transition"
          />
        </div>

        <button
          type="submit"
          class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800
                 text-white font-semibold rounded-lg shadow-sm transition text-sm"
        >
          로그인
        </button>
      </form>

      <div class="mt-6 pt-5 border-t border-slate-100 text-center text-xs text-slate-400">
        User → API 설정 페이지 &nbsp;|&nbsp; Admin → 테스트 제어 페이지
      </div>
    </div>
  </div>

</body>
</html>
